<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10120f" />
    <title>flora. | Plant identifier</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10120f;
        --panel: #151814;
        --panel-strong: #1a1e18;
        --text: #eff1e9;
        --muted: #969d8e;
        --line: #30362d;
        --accent: #a7b77a;
        --accent-dark: #182010;
        --danger: #d2766c;
        --warning: #d1a95d;
        --success: #8eb67d;
        --radius: 3px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
          var(--bg);
        background-size: 32px 32px;
        color: var(--text);
        font: 15px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button, input { font: inherit; }
      button { color: inherit; }

      .shell {
        width: min(720px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 42px;
      }

      .wordmark {
        margin: 0;
        font: 700 clamp(30px, 6vw, 44px)/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: -.08em;
      }

      .tagline {
        margin: 0 0 3px;
        color: var(--muted);
        font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: .09em;
        text-transform: uppercase;
      }

      .section-label {
        display: block;
        margin-bottom: 9px;
        color: var(--muted);
        font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: .11em;
        text-transform: uppercase;
      }

      .backend-row {
        display: flex;
        gap: 8px;
        margin-bottom: 18px;
      }

      .pill, .organ-button {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        cursor: pointer;
        transition: border-color .18s ease, background .18s ease, color .18s ease;
      }

      .pill {
        padding: 8px 14px;
        color: var(--muted);
      }

      .pill:hover, .organ-button:hover { border-color: var(--accent); color: var(--text); }
      .pill[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent);
        color: #10120f;
      }

      .health {
        display: none;
        margin: 0 0 18px;
        padding: 10px 12px;
        border-left: 2px solid var(--warning);
        background: #1d1a12;
        color: #d8c79e;
        font-size: 13px;
      }

      .image-zone {
        position: relative;
        display: grid;
        width: 100%;
        min-height: min(52vh, 430px);
        place-items: center;
        overflow: hidden;
        border: 1px dashed #4a5145;
        border-radius: var(--radius);
        background: #121510;
        cursor: pointer;
        transition: border-color .18s ease, background .18s ease;
      }

      .image-zone:hover, .image-zone:focus-within {
        border-color: var(--accent);
        background: #141811;
      }

      .image-zone.has-image { border-style: solid; }

      #imageInput {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      #preview {
        display: none;
        width: 100%;
        height: 100%;
        min-height: min(52vh, 430px);
        object-fit: contain;
        background: #090a09;
      }

      .upload-prompt {
        display: grid;
        justify-items: center;
        gap: 12px;
        padding: 32px;
        color: var(--muted);
        text-align: center;
      }

      .camera-mark {
        display: grid;
        width: 58px;
        height: 58px;
        place-items: center;
        border: 1px solid var(--accent);
        border-radius: 50%;
        color: var(--accent);
        font: 28px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .upload-prompt strong { color: var(--text); font-weight: 500; }
      .upload-prompt small { font-size: 12px; }

      .image-zone.loading::after {
        position: absolute;
        inset: 0;
        content: "";
        background: rgba(12, 14, 11, .58);
        animation: pulse 1.35s ease-in-out infinite;
      }

      @keyframes pulse { 50% { background: rgba(35, 43, 29, .52); } }

      .controls {
        display: grid;
        gap: 24px;
        margin-top: 24px;
      }

      .organ-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }

      .organ-button {
        padding: 9px 4px;
        border: 0;
        border-right: 1px solid var(--line);
        border-radius: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .organ-button:last-child { border-right: 0; }
      .organ-button[aria-pressed="true"] {
        background: var(--panel-strong);
        color: var(--accent);
      }

      .identify-button {
        width: 100%;
        padding: 13px 18px;
        border: 1px solid var(--accent);
        border-radius: var(--radius);
        background: var(--accent);
        color: #10120f;
        cursor: pointer;
        font-weight: 700;
        letter-spacing: .01em;
        transition: background .18s ease, color .18s ease;
      }

      .identify-button:hover:not(:disabled) { background: #bdca96; }
      .identify-button:disabled {
        border-color: var(--line);
        background: transparent;
        color: #62685d;
        cursor: not-allowed;
      }

      .result {
        display: none;
        margin-top: 32px;
        padding: 26px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
      }

      .result.visible {
        display: block;
        animation: reveal .3s ease both;
      }

      @keyframes reveal {
        from { opacity: 0; transform: translateY(8px); }
      }

      .result-top {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 24px;
      }

      .scientific-name {
        margin: 0;
        font: italic 500 clamp(25px, 5vw, 34px)/1.2 Georgia, serif;
      }

      .common-names, .family {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .family { font-size: 12px; }

      .badge {
        flex: 0 0 auto;
        padding: 5px 9px;
        border: 1px solid currentColor;
        border-radius: 999px;
        font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: .06em;
        text-transform: uppercase;
      }

      .badge.edible { color: var(--success); }
      .badge.not-edible { color: var(--danger); }
      .badge.unknown { color: var(--muted); }

      .confidence { margin: 24px 0; }
      .confidence-copy {
        display: flex;
        justify-content: space-between;
        margin-bottom: 7px;
        color: var(--muted);
        font: 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .confidence-track { height: 4px; background: #292e27; }
      .confidence-fill { height: 100%; background: var(--accent); transition: width .6s ease; }

      .facts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        margin: 0 0 20px;
        background: var(--line);
        border: 1px solid var(--line);
      }

      .fact { padding: 13px; background: var(--panel); }
      .fact dt {
        color: var(--muted);
        font: 10px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        letter-spacing: .08em;
        text-transform: uppercase;
      }
      .fact dd { margin: 5px 0 0; }

      .safety {
        margin: 0 0 20px;
        padding-left: 11px;
        border-left: 2px solid var(--warning);
        color: #c9bea4;
        font-size: 12px;
      }

      .pfaf-link { color: var(--accent); text-underline-offset: 4px; }

      details {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }
      summary { color: var(--muted); cursor: pointer; }
      .candidate {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 11px 0;
        border-bottom: 1px solid #262b24;
      }
      .candidate:last-child { border: 0; }
      .candidate small { display: block; color: var(--muted); }

      .message-card {
        border-left: 2px solid var(--warning);
        background: #1d1a12;
      }
      .message-card.error { border-color: var(--danger); background: #211513; }
      .message-card h2 { margin: 0 0 7px; font-size: 18px; }
      .message-card p { margin: 0; color: var(--muted); }
      .retry {
        margin-top: 16px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: transparent;
        cursor: pointer;
      }

      .footer-note {
        margin-top: 30px;
        color: #70766b;
        font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        text-align: center;
      }

      @media (max-width: 560px) {
        .shell { width: min(100% - 22px, 720px); padding-top: 26px; }
        header { margin-bottom: 30px; }
        .tagline { display: none; }
        .image-zone, #preview { min-height: 48vh; }
        .result { padding: 20px 16px; }
        .result-top { display: grid; }
        .badge { justify-self: start; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <h1 class="wordmark">flora.</h1>
        <p class="tagline">point. scan. know.</p>
      </header>

      <section aria-labelledby="backendLabel">
        <span class="section-label" id="backendLabel">Identification engine</span>
        <div class="backend-row">
          <button class="pill" type="button" data-backend="plantnet" aria-pressed="true">
            Pl@ntNet API
          </button>
          <button class="pill" type="button" data-backend="local" aria-pressed="false">
            Local model
          </button>
        </div>
        <p class="health" id="healthWarning" role="status"></p>
      </section>

      <label class="image-zone" id="imageZone" for="imageInput">
        <input
          id="imageInput"
          type="file"
          accept="image/jpeg,image/png"
          capture="environment"
        />
        <img id="preview" alt="Selected plant preview" />
        <span class="upload-prompt" id="uploadPrompt">
          <span class="camera-mark" aria-hidden="true">+</span>
          <span><strong>Take a photo</strong> or choose an image</span>
          <small>JPEG or PNG · max 10MB</small>
        </span>
      </label>

      <section class="controls">
        <div>
          <span class="section-label">Visible plant part</span>
          <div class="organ-row" aria-label="Visible plant part">
            <button class="organ-button" type="button" data-organ="auto" aria-pressed="true">Auto</button>
            <button class="organ-button" type="button" data-organ="leaf" aria-pressed="false">Leaf</button>
            <button class="organ-button" type="button" data-organ="flower" aria-pressed="false">Flower</button>
            <button class="organ-button" type="button" data-organ="fruit" aria-pressed="false">Fruit</button>
            <button class="organ-button" type="button" data-organ="bark" aria-pressed="false">Bark</button>
          </div>
        </div>
        <button class="identify-button" id="identifyButton" type="button" disabled>
          Identify plant
        </button>
      </section>

      <section class="result" id="result" aria-live="polite"></section>
      <p class="footer-note">Identification is informational. Never consume a wild plant without expert verification.</p>
    </main>

    <script>
      const imageInput = document.querySelector("#imageInput");
      const imageZone = document.querySelector("#imageZone");
      const preview = document.querySelector("#preview");
      const uploadPrompt = document.querySelector("#uploadPrompt");
      const identifyButton = document.querySelector("#identifyButton");
      const result = document.querySelector("#result");
      const healthWarning = document.querySelector("#healthWarning");
      const backendButtons = [...document.querySelectorAll("[data-backend]")];
      const organButtons = [...document.querySelectorAll("[data-organ]")];

      let selectedFile = null;
      let selectedOrgan = "auto";
      let selectedBackend = localStorage.getItem("flora-backend") || "plantnet";
      if (!["plantnet", "local"].includes(selectedBackend)) selectedBackend = "plantnet";

      function setPressed(buttons, activeButton) {
        buttons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button === activeButton));
        });
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function confidencePercent(value) {
        return Math.max(0, Math.min(100, Math.round(Number(value || 0) * 100)));
      }

      setPressed(
        backendButtons,
        backendButtons.find((button) => button.dataset.backend === selectedBackend),
      );

      backendButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedBackend = button.dataset.backend;
          localStorage.setItem("flora-backend", selectedBackend);
          setPressed(backendButtons, button);
        });
      });

      organButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedOrgan = button.dataset.organ;
          setPressed(organButtons, button);
        });
      });

      imageInput.addEventListener("change", () => {
        const [file] = imageInput.files;
        if (!file) return;
        selectedFile = file;
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        uploadPrompt.style.display = "none";
        imageZone.classList.add("has-image");
        identifyButton.disabled = false;
        result.classList.remove("visible");
      });

      function renderMessage(message, isError = false, retry = true) {
        result.className = `result visible message-card${isError ? " error" : ""}`;
        result.innerHTML = `
          <h2>${isError ? "Identification failed" : "Try another photo"}</h2>
          <p>${escapeHtml(message)}</p>
          ${retry ? '<button class="retry" type="button">Choose another image</button>' : ""}
        `;
        result.querySelector(".retry")?.addEventListener("click", resetImage);
      }

      function resetImage() {
        selectedFile = null;
        imageInput.value = "";
        if (preview.src) URL.revokeObjectURL(preview.src);
        preview.removeAttribute("src");
        preview.style.display = "none";
        uploadPrompt.style.display = "grid";
        imageZone.classList.remove("has-image");
        identifyButton.disabled = true;
        result.classList.remove("visible");
        imageInput.click();
      }

      function renderIdentification(data) {
        const plant = data.identification;
        const edibility = data.edibility || {};
        const confidence = confidencePercent(plant.confidence);
        const edibleState =
          edibility.isEdible === true
            ? { label: "Edible", className: "edible" }
            : edibility.isEdible === false
              ? { label: "Not edible", className: "not-edible" }
              : { label: "Unknown", className: "unknown" };
        const parts = edibility.edibleParts?.length
          ? edibility.edibleParts.join(", ")
          : "Not documented";
        const names = plant.commonNames?.length
          ? plant.commonNames.join(" · ")
          : "No common name listed";
        const candidates = (plant.allCandidates || [])
          .map(
            (candidate) => `
              <div class="candidate">
                <span>
                  ${escapeHtml(candidate.scientificName)}
                  <small>${escapeHtml(candidate.commonNames?.join(", ") || "No common names")}</small>
                </span>
                <span>${confidencePercent(candidate.confidence)}%</span>
              </div>
            `,
          )
          .join("");

        result.className = "result visible";
        result.innerHTML = `
          <div class="result-top">
            <div>
              <h2 class="scientific-name">${escapeHtml(plant.scientificName)}</h2>
              <p class="common-names">${escapeHtml(names)}</p>
              <p class="family">${escapeHtml(plant.family)}</p>
            </div>
            <span class="badge ${edibleState.className}">${edibleState.label}</span>
          </div>
          <div class="confidence">
            <div class="confidence-copy"><span>Confidence</span><span>${confidence}%</span></div>
            <div class="confidence-track"><div class="confidence-fill" style="width:${confidence}%"></div></div>
          </div>
          <dl class="facts">
            <div class="fact"><dt>Edible parts</dt><dd>${escapeHtml(parts)}</dd></div>
            <div class="fact"><dt>Toxicity</dt><dd>${escapeHtml(edibility.toxicity || "unknown")}</dd></div>
          </dl>
          <p class="safety">Verify before consuming. ${escapeHtml(edibility.safetyNote || "")}</p>
          <a class="pfaf-link" href="${escapeHtml(data.references?.pfafUrl)}" target="_blank" rel="noopener">
            View cultivation guide →
          </a>
          <details>
            <summary>Top candidates</summary>
            ${candidates}
          </details>
        `;
      }

      identifyButton.addEventListener("click", async () => {
        if (!selectedFile) return;
        const form = new FormData();
        form.append("image", selectedFile);
        form.append("organ", selectedOrgan);

        identifyButton.disabled = true;
        identifyButton.textContent = "Identifying…";
        imageZone.classList.add("loading");
        result.classList.remove("visible");

        try {
          const response = await fetch(`/identify/${selectedBackend}`, {
            method: "POST",
            body: form,
          });
          const data = await response.json().catch(() => ({
            status: "error",
            message: "The server returned an unreadable response.",
          }));

          if (!response.ok || data.status === "error") {
            throw new Error(data.message || "Identification service unavailable.");
          }
          if (data.status === "no_plant") {
            renderMessage(data.message || "No plant detected in this image.");
          } else if (data.status === "low_confidence") {
            renderMessage(
              data.message ||
                "Couldn't identify with enough certainty. Try a clearer photo of the leaf, flower, or fruit.",
            );
          } else {
            renderIdentification(data);
          }
        } catch (error) {
          renderMessage(error.message, true, false);
        } finally {
          imageZone.classList.remove("loading");
          identifyButton.disabled = false;
          identifyButton.textContent = "Identify plant";
        }
      });

      fetch("/health")
        .then((response) => response.json())
        .then((health) => {
          const warnings = [];
          if (!health.plantnetConfigured) warnings.push("Pl@ntNet API key is missing.");
          if (!health.trefleConfigured) warnings.push("Trefle token is missing; edibility data will be limited.");
          if (warnings.length) {
            healthWarning.textContent = warnings.join(" ");
            healthWarning.style.display = "block";
          }
        })
        .catch(() => {
          healthWarning.textContent = "The identification server is not responding.";
          healthWarning.style.display = "block";
        });
    </script>
  </body>
</html>
